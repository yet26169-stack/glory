name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Cancel in-flight runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── AddressSanitizer + UndefinedBehaviorSanitizer ──────────────────────────
  tests-asan-ubsan:
    name: "Tests — ASan + UBSan (Clang)"
    runs-on: ubuntu-22.04
    env:
      ASAN_OPTIONS:  "halt_on_error=1:detect_leaks=1:print_stacktrace=1"
      UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang ninja-build \
            libvulkan-dev libglfw3-dev libglm-dev libspdlog-dev

      - name: Configure (ASan + UBSan)
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DGLORY_ASAN=ON \
            -DGLORY_UBSAN=ON

      - name: Build tests
        run: |
          cmake --build build \
            --target test_mirror test_maploader test_terrain \
            -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  # ── ThreadSanitizer ────────────────────────────────────────────────────────
  tests-tsan:
    name: "Tests — TSan (Clang)"
    runs-on: ubuntu-22.04
    env:
      TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang ninja-build \
            libvulkan-dev libglfw3-dev libglm-dev libspdlog-dev

      - name: Configure (TSan)
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DGLORY_TSAN=ON

      - name: Build tests
        run: |
          cmake --build build \
            --target test_mirror test_maploader test_terrain \
            -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure


name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Cancel in-flight runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: "Release Build (GCC)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libvulkan-dev \
            shaderc \
            libglfw3-dev \
            libglm-dev \
            libspdlog-dev

      - name: Configure (Release)
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure

  build-sanitizers:
    name: "Debug + Sanitizers (Clang)"
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: "halt_on_error=1:detect_leaks=1:print_stacktrace=1"
      UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang \
            ninja-build \
            libvulkan-dev \
            shaderc \
            libglfw3-dev \
            libglm-dev \
            libspdlog-dev

      - name: Configure (Debug + ASan + UBSan)
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DGLORY_ASAN=ON \
            -DGLORY_UBSAN=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure
